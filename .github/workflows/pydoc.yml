name: Generate Pydoc
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate Docs
        run: |
          mkdir -p docs
          # Ejecutamos pydoc sobre el entorno actual exportando a la carpeta docs
          python -c "
          import os, pydoc
          # Buscamos todos los archivos .py en blog y my_site
          modules = []
          for root, dirs, files in os.walk('.'):
              if 'venv' in root or '.git' in root or 'docs' in root: continue
              for f in files:
                  if f.endswith('.py') and f != '__init__.py':
                      # Convertimos la ruta del archivo en formato de módulo de pydoc
                      mod_path = os.path.join(root, f).replace('./', '').replace('/', '.').replace('.py', '')
                      modules.append(mod_path)
          
          # Generamos el HTML para cada uno dentro de docs
          os.chdir('docs')
          for m in modules:
              pydoc.writedoc(m)
          "
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
