name: Generate Pydoc
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pdoc  # Instalamos la herramienta moderna de documentación
      - name: Generate Docs
        run: |
          # Generamos la documentación en HTML de tus carpetas dentro de ./docs
          pdoc --html --output-dir docs blog my_site manage.py --force
          # Movemos el contenido para que GitHub Pages lo lea directamente en la raíz de docs
          mv docs/blog docs/my_site docs/*.html docs/ 2>/dev/null || true
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
