name: Generate Pydoc
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pdoc
      - name: Generate Docs
        run: |
          # Usamos la sintaxis moderna de pdoc (-o especifica la carpeta de salida)
          pdoc -o docs blog my_site manage.py
