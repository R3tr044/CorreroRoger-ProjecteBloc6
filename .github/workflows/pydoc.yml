name: Generate Pydoc
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.11'
      - name: Generate Docs
        run: |
          mkdir -p docs
          # Esto busca todos tus .py y genera el HTML
          python -m pydoc -w .
          # Mueve los archivos generados a la carpeta docs
          mv *.html docs/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs