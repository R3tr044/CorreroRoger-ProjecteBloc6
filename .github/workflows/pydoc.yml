name: Generate Pydoc
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pdoc
      - name: Generate Docs
        env:
          DJANGO_SETTINGS_MODULE: my_site.settings
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}"
          python -c "
          import django, pdoc, pathlib
          django.setup()
          # Pasamos la carpeta usando Path para que no falle la concatenación de la librería
          pdoc.pdoc('blog', 'my_site', 'manage.py', output_directory=pathlib.Path('docs'))
          "
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
